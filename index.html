<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KJati - Kemenag Jember Absensi Terintegrasi</title>
  
  <!-- Leaflet (Peta) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
  
  <!-- Font & Style -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #F4F7F6; color: #333; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.3s; width: 100%; margin-top: 10px; text-align: center; display: inline-block; text-decoration: none; }
    .btn-primary { background: #27AE60; color: white; }
    .btn-primary:hover { background: #229954; }
    .btn-secondary { background: #3498DB; color: white; }
    .btn-danger { background: #E74C3C; color: white; }
    .btn-outline { background: transparent; border: 1px solid #3498DB; color: #3498DB; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; display: block; }
    textarea { min-height: 120px; resize: vertical; }
    label { display: block; font-weight: 600; color: #444; margin-top: 12px; font-size: 14px; }
    .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; z-index: 9999; box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast-success { background: #27AE60; }
    .toast-error { background: #E74C3C; }
    .tabs { display: flex; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
    .tab { flex: 1; padding: 12px; border: none; background: #f9f9f9; cursor: pointer; font-weight: 500; font-family: inherit; }
    .tab.active { background: #27AE60; color: white; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logout-btn { background: none; border: none; color: #E74C3C; cursor: pointer; font-weight: bold; width: auto; margin: 0; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
    .modal-content { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; position: relative; }
    .table-responsive { overflow-x: auto; margin-top: 15px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    th { background: #f9f9f9; font-weight: 600; color: #555; }
    .thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
    video { width: 100%; border-radius: 8px; transform: scaleX(-1); background: #000; max-height: 400px; display: block; }
    .signature-canvas { border: 2px solid #ccc; border-radius: 8px; width: 100%; height: 200px; cursor: crosshair; touch-action: none; background: #fff; margin-bottom: 10px; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    .badge-success { background: #E8F8F5; color: #27AE60; }
    .badge-danger { background: #FDEDEC; color: #E74C3C; }
    .badge-gray { background: #F4F7F6; color: #888; border: 1px solid #ddd; }
    .main-logo { width: 80px; height: auto; margin-bottom: 10px; }
    .relative { position: relative; }
    .suggestions { position: absolute; background: white; border: 1px solid #ddd; width: 100%; max-height: 150px; overflow-y: auto; z-index: 10; list-style: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; }
    .suggestion-item:hover { background: #f5f5f5; color: #27AE60; }
    .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; z-index: 5; border-radius: 12px; }
    .required-star { color: #E74C3C; font-weight: bold; margin-left: 4px; }
    .status-checked { color: #27AE60; font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .stats-card { background: #E8F8F5; color: #27AE60; padding: 10px 15px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 8px; }
    .history-item { padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; background: #fff; }
    .history-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .history-details { display: flex; gap: 15px; margin-top: 10px; }
    .history-thumb { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; border: 1px solid #ddd; }
    .section-title { font-size: 16px; font-weight: 700; color: #27AE60; margin-bottom: 15px; border-bottom: 2px solid #E8F8F5; padding-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  </style>
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
